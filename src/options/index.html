<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HomeHunt Assistant Settings</title>
    <style>
      :root {
        --bg: #fafafa;
        --panel: #ffffff;
        --text: #0f172a;
        --muted: #6b7280;
        --line: #e4e4e7;
        --field: #f4f4f5;
        --primary: #10b981;
        --primary-hover: #0ea874;
        --danger: #dc2626;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        padding: 24px 16px 30px;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      }

      main {
        max-width: 672px;
        margin: 0 auto;
      }

      h1 {
        margin: 0;
        font-size: 40px;
        line-height: 1.05;
        letter-spacing: -0.8px;
        font-weight: 800;
        text-align: center;
      }

      .subtitle {
        margin: 8px 0 20px;
        font-size: 14px;
        line-height: 1.35;
        letter-spacing: -0.2px;
        text-align: center;
      }

      .subtitle span {
        color: #5f6672;
        font-weight: 500;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        overflow: hidden;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
      }

      .card-inner {
        padding: 24px;
        text-align: left;
      }

      .field {
        margin-bottom: 16px;
      }

      .field:last-child {
        margin-bottom: 0;
      }

      .label {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        color: #3f3f46;
        font-size: 14px;
        line-height: 1.2;
        font-weight: 700;
        letter-spacing: -0.05px;
      }

      .label-icon {
        width: 20px;
        text-align: center;
        color: #9ca3af;
        font-size: 17px;
        line-height: 1;
      }

      input, textarea, select {
        width: 100%;
        border: 1px solid #d4d4d8;
        border-radius: 12px;
        background: var(--field);
        color: #111827;
        font-size: 15px;
        line-height: 1.2;
        padding: 12px 14px;
      }

      input:focus, textarea:focus, select:focus {
        outline: 0;
        border-color: #bfdbfe;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.16);
      }

      textarea {
        min-height: 108px;
        resize: vertical;
        font-family: inherit;
      }

      .hint {
        margin-top: 8px;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 1.6px;
        font-size: 10px;
        font-weight: 700;
      }

      .actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        border-top: 1px solid var(--line);
        padding: 14px 24px;
        background: #fff;
      }

      button {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 600;
        line-height: 1;
        cursor: pointer;
      }

      .save {
        background: var(--primary);
        color: #ffffff;
        min-width: 156px;
        box-shadow: 0 6px 16px rgba(16, 185, 129, 0.28);
      }

      .save:hover {
        background: var(--primary-hover);
      }

      .danger {
        background: #ffffff;
        color: var(--danger);
        border-color: #fca5a5;
        border-width: 1px;
        padding: 9px 14px;
        min-width: 126px;
      }

      .danger:hover {
        color: #b91c1c;
        border-color: #ef4444;
        background: #fef2f2;
      }

      .status {
        margin-top: 10px;
        color: #4b5563;
        font-size: 12px;
        font-weight: 500;
      }

      .actions-left {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .actions-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      @media (max-width: 760px) {
        body { padding: 18px 12px; }
        h1 { font-size: 33px; letter-spacing: -0.8px; }
        .subtitle { font-size: 13px; margin-bottom: 16px; }
        .card-inner { padding: 16px; }
        .field { margin-bottom: 14px; }
        .label { font-size: 13px; }
        input, textarea, select { font-size: 14px; }
        .hint { letter-spacing: 1px; font-size: 9px; }
        .actions { padding: 12px 16px; gap: 10px; flex-wrap: wrap; }
        .actions-left { width: 100%; justify-content: flex-start; }
        .actions-right { width: 100%; justify-content: flex-end; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Assistant Settings</h1>
      <div class="subtitle"><span>Configure your AI evaluate feature and preferences</span></div>

      <section class="card">
        <div class="card-inner">
          <div class="field">
            <label class="label" for="apiKey"><span class="label-icon">◌</span>OpenAI API Key</label>
            <input id="apiKey" type="password" placeholder="sk-..." />
            <div class="hint">Your key is stored securely in local extension storage.</div>
          </div>

          <div class="field">
            <label class="label" for="model"><span class="label-icon">⚙</span>AI Model</label>
            <select id="model">
              <option value="gpt-4.1-mini">gpt-4.1-mini</option>
              <option value="gpt-4.1">gpt-4.1</option>
            </select>
          </div>

          <div class="field">
            <label class="label" for="mode"><span class="label-icon">✦</span>Report Mode</label>
            <select id="mode">
              <option value="fast">Fast</option>
              <option value="detailed">Detailed</option>
            </select>
          </div>

          <div class="field">
            <label class="label" for="priorities"><span class="label-icon">⚠</span>Risk Priorities</label>
            <textarea
              id="priorities"
              placeholder="e.g. flood zones, high maintenance fees, walk-up floor count..."
            ></textarea>
            <div class="hint">AI will prioritize these factors during property evaluation.</div>
          </div>

          <div class="field">
            <label class="label" for="retentionDays"><span class="label-icon">◷</span>Retention Window</label>
            <select id="retentionDays">
              <option value="30">30 Days</option>
              <option value="90">90 Days (default)</option>
              <option value="120">120 Days</option>
              <option value="180">180 Days</option>
            </select>
          </div>
          <div class="status" id="status"></div>
        </div>

        <div class="actions">
          <div class="actions-left">
            <button class="danger" id="clearBtn">Clear API Key</button>
            <button class="danger" id="clearDataBtn">Clear Tracked Data</button>
          </div>
          <div class="actions-right">
            <button class="save" id="saveBtn">Save Settings</button>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="./options.js"></script>
  </body>
</html>
